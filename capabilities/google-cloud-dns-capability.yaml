naftiko: 1.0.0-alpha2
info:
  label: Google Cloud DNS API
  description: Manages DNS zones and resource record sets on Google Cloud, including creating managed zones, configuring DNS
    records, and managing DNS policies.
  tags:
  - Google
  - Cloud
  - Dns
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
