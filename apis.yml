name: Google Cloud DNS
description: >-
  Google Cloud DNS is a scalable, reliable, and managed authoritative Domain Name
  System (DNS) service running on the same infrastructure as Google. It provides
  low-latency, high-availability DNS serving with 100% uptime SLA, supporting
  both public and private DNS zones for domain name resolution.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
