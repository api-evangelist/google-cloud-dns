  - Networking
  - Name Resolution
apis:
  - name: Google Cloud DNS API
    description: >-
      The Cloud DNS API enables programmatic management of DNS zones and resource
      record sets, including creating and configuring managed zones, adding and
      modifying DNS records, and managing DNS policies for private zones.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cloud.google.com/dns/docs/reference/v1
    baseURL: https://dns.googleapis.com
    tags:
      - Managed Zones
      - Resource Record Sets
      - DNS Policies
      - Changes
    properties:
      - type: OpenAPI
        url: openapi/dns-openapi.yml
      - type: JSONSchema
        url: json-schema/dns-managedzone.json
